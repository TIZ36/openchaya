<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>Chaya · 方向 B — 静室 (Quiet Room)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;700&family=Manrope:wght@300;400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.7.0/style.css" rel="stylesheet">
<style>
  :root {
    --paper: #fbfaf7;            /* warm off-white */
    --ground: #f4f2ec;
    --page:  #ffffff;
    --ink:   #1b1a17;
    --ink-soft: #5a5852;
    --pencil: #9a988f;
    --pencil-soft: #c6c3b8;
    --rule:  #eae6dd;
    --rule-strong: #dcd7c8;
    --vermilion: #b93e2e;        /* 朱砂 — 印章色 */
    --vermilion-soft: #eadbd5;
    --display: 'Shippori Mincho', 'LXGW WenKai', ui-serif, serif;
    --sans: 'Manrope', 'LXGW WenKai', ui-sans-serif, system-ui;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--paper); color: var(--ink); font-family: var(--sans); font-weight: 300; -webkit-font-smoothing: antialiased; }
  body { line-height: 1.7; }
  .shell { display: grid; grid-template-columns: 220px 1fr; height: 100vh; }
  /* sidebar — almost invisible */
  .side { padding: 56px 28px; overflow-y: auto; }
  .wordmark { font-family: var(--display); font-size: 22px; font-weight: 500; letter-spacing: 0.12em; color: var(--ink); }
  .wordmark::after { content: ""; display: block; width: 12px; height: 1px; background: var(--vermilion); margin-top: 10px; }
  .tagline { font-size: 10.5px; color: var(--pencil); margin-top: 14px; letter-spacing: 0.22em; text-transform: uppercase; font-weight: 400; }
  .side-label { font-size: 10px; letter-spacing: 0.28em; color: var(--pencil); text-transform: uppercase; margin: 48px 0 16px; font-weight: 500; }
  .agent-list { display: flex; flex-direction: column; gap: 0; }
  .agent { display: flex; align-items: baseline; gap: 10px; padding: 10px 0; cursor: pointer; color: var(--ink-soft); text-decoration: none; border-top: 1px solid var(--rule); font-family: var(--display); font-size: 14px; font-weight: 400; letter-spacing: 0.04em; }
  .agent:last-child { border-bottom: 1px solid var(--rule); }
  .agent:hover { color: var(--ink); }
  .agent.active { color: var(--ink); }
  .agent.active::before { content: "●"; color: var(--vermilion); font-size: 7px; margin-right: 2px; }
  .agent .sub { font-size: 10px; color: var(--pencil-soft); margin-left: auto; letter-spacing: 0.1em; font-family: var(--mono); font-weight: 400; }
  /* main */
  .main { background: var(--page); display: grid; grid-template-rows: auto 1fr auto; overflow: hidden; border-left: 1px solid var(--rule); }
  .topbar { padding: 40px 64px 28px; display: flex; align-items: flex-end; justify-content: space-between; }
  .topbar .title-group { display: flex; align-items: baseline; gap: 16px; }
  .topbar .seal { width: 34px; height: 34px; border: 1.5px solid var(--vermilion); display: flex; align-items: center; justify-content: center; font-family: var(--display); font-size: 15px; color: var(--vermilion); font-weight: 700; transform: rotate(-3deg); }
  .topbar h1 { font-family: var(--display); font-size: 22px; font-weight: 500; letter-spacing: 0.06em; color: var(--ink); }
  .topbar .meta { font-size: 10.5px; color: var(--pencil); font-family: var(--mono); letter-spacing: 0.1em; }
  .chat { padding: 8px 64px 40px; overflow-y: auto; }
  .msg { margin-bottom: 48px; max-width: 58ch; }
  .msg.me { margin-left: auto; max-width: 48ch; }
  .byline { font-size: 9.5px; color: var(--pencil); letter-spacing: 0.28em; text-transform: uppercase; margin-bottom: 14px; font-weight: 500; }
  .me .byline { text-align: right; color: var(--vermilion); }
  .bubble { font-size: 15px; line-height: 1.95; color: var(--ink); font-weight: 300; }
  .me .bubble { font-family: var(--display); font-size: 15px; font-weight: 400; line-height: 1.85; color: var(--ink-soft); }
  .stream .bubble::after { content: "|"; color: var(--vermilion); animation: blink 1.1s steps(1) infinite; margin-left: 4px; font-weight: 100; }
  @keyframes blink { 50% { opacity: 0; } }
  .composer { padding: 24px 64px 40px; border-top: 1px solid var(--rule); display: flex; gap: 16px; align-items: flex-end; }
  .field { flex: 1; }
  .field textarea { width: 100%; background: transparent; border: 0; outline: none; font-family: var(--sans); font-size: 15px; font-weight: 300; color: var(--ink); padding: 12px 0; resize: none; line-height: 1.7; }
  .field textarea::placeholder { color: var(--pencil-soft); font-style: italic; }
  .send { font-family: var(--display); font-size: 13px; font-weight: 500; padding: 14px 26px; background: transparent; color: var(--vermilion); border: 1px solid var(--vermilion); cursor: pointer; letter-spacing: 0.22em; text-transform: uppercase; transition: all 0.2s ease; }
  .send:hover { background: var(--vermilion); color: var(--paper); }
  .chat::-webkit-scrollbar { width: 0; } /* totally invisible */
  .side::-webkit-scrollbar { width: 0; }
</style>
</head>
<body>
<div class="shell">
  <aside class="side">
    <div class="wordmark">Chaya</div>
    <div class="tagline">静 &nbsp; 室</div>

    <div class="side-label">伙伴</div>
    <div class="agent-list">
      <a class="agent active">阿茶<span class="sub">NOW</span></a>
      <a class="agent">小史<span class="sub">12m</span></a>
      <a class="agent">Ledger<span class="sub">2h</span></a>
    </div>

    <div class="side-label">最近</div>
    <div class="agent-list">
      <a class="agent">关于明朝家具<span class="sub">—</span></a>
      <a class="agent">读《东京本屋》<span class="sub">—</span></a>
    </div>
  </aside>
  <main class="main">
    <header class="topbar">
      <div class="title-group">
        <div class="seal">茶</div>
        <h1>阿 &nbsp; 茶</h1>
      </div>
      <div class="meta">GPT-4o &nbsp;·&nbsp; 23°</div>
    </header>
    <section class="chat">
      <div class="msg me">
        <div class="byline">你</div>
        <div class="bubble">我想开一家只卖两三种茶的小店，给我讲讲该怎么开始。</div>
      </div>
      <div class="msg">
        <div class="byline">阿茶</div>
        <div class="bubble">最重要的不是货，是你为什么只卖这两三种。</div>
        <div class="bubble" style="margin-top: 16px;">把这句话贴在墙上，客人才进得来。你先想想——你喝了最多年的是哪一种？那就是第一款。第二款是跟它不一样的，它厚你就选一款清的。第三款不急，留到半年后再加。</div>
      </div>
      <div class="msg stream">
        <div class="byline">阿茶 · 正在写</div>
        <div class="bubble">选址方面，我会建议你先不要急</div>
      </div>
    </section>
    <footer class="composer">
      <div class="field">
        <textarea rows="1" placeholder="…"></textarea>
      </div>
      <button class="send">寄</button>
    </footer>
  </main>
</div>
</body>
</html>
