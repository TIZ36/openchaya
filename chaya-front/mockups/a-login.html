<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>Chaya · 登入</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Young+Serif&family=Commissioner:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.7.0/style.css" rel="stylesheet">
<link rel="stylesheet" href="./_shared.css">
<style>
  html, body { height: 100vh; overflow: hidden; }
  .frame { display: grid; grid-template-columns: 1fr 1fr; height: 100vh; }
  /* left — wordmark & blurb panel */
  .left {
    padding: 60px 72px;
    display: flex; flex-direction: column; justify-content: space-between;
    border-right: 1px solid var(--rule);
    background: linear-gradient(180deg, var(--paper) 0%, color-mix(in oklch, var(--accent) 4%, var(--paper)) 100%);
    position: relative;
  }
  .left::after {
    content: ""; position: absolute; inset: 24px; pointer-events: none;
    border: 1px solid var(--rule-strong);
    border-image: repeating-linear-gradient(45deg, var(--rule-strong) 0, var(--rule-strong) 6px, transparent 6px, transparent 12px) 1;
    opacity: 0.25;
  }
  .left .top { position: relative; z-index: 1; }
  .left .overline { font-size: 11px; letter-spacing: 0.28em; color: var(--pencil); text-transform: uppercase; margin-bottom: 18px; }
  .left h1.hero { font-family: var(--display); font-size: 72px; line-height: 0.95; color: var(--ink-strong); letter-spacing: -0.02em; }
  .left h1.hero span { color: var(--accent); }
  .left .copy { margin-top: 18px; max-width: 38ch; font-size: 16px; line-height: 1.8; color: var(--ink); }
  .left .copy em { font-family: var(--display); font-style: italic; color: var(--accent); }
  .left .hand-rule-lg { margin: 28px 0 0; display: block; }
  .left .marginalia { position: relative; z-index: 1; padding: 14px 18px; background: color-mix(in oklch, var(--marginalia) 35%, transparent); border-left: 3px solid var(--marginalia-ink); max-width: 44ch; font-family: var(--display); font-style: italic; font-size: 13.5px; color: var(--marginalia-ink); line-height: 1.7; }
  .left .colo {
    display: flex; justify-content: space-between; align-items: flex-end;
    font-family: var(--mono); font-size: 11px; color: var(--pencil); letter-spacing: 0.08em;
    position: relative; z-index: 1;
  }
  /* right — form */
  .right { padding: 60px 64px; display: flex; flex-direction: column; justify-content: center; gap: 32px; max-width: 520px; width: 100%; }
  .form-overline { font-size: 11px; letter-spacing: 0.28em; color: var(--pencil); text-transform: uppercase; }
  .tabs { display: flex; gap: 20px; align-items: baseline; }
  .tab {
    font-family: var(--display); font-size: 20px; color: var(--pencil);
    cursor: pointer; padding: 0; background: transparent; border: 0;
    position: relative; padding-bottom: 6px;
  }
  .tab.active { color: var(--ink-strong); }
  .tab.active::after { content: ""; position: absolute; left: 0; right: 0; bottom: -2px; height: 2px; background: var(--accent); border-radius: 1px; }
  .tab-sep { color: var(--rule-strong); font-family: var(--display); font-size: 18px; }
  form { display: flex; flex-direction: column; gap: 22px; }
  .submit-btn { margin-top: 8px; width: 100%; padding: 14px; font-family: var(--display); font-size: 15px; letter-spacing: 0.04em; background: var(--accent); color: var(--paper); border: 0; border-radius: 2px; cursor: pointer; transition: background 180ms var(--ease); box-shadow: 0 1px 0 color-mix(in oklch, var(--ink) 25%, transparent), 0 2px 6px oklch(0.18 0.02 310 / 0.12); }
  .submit-btn:hover { background: var(--accent-h); }
  .right .aux-line { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--pencil); padding-top: 12px; border-top: 1px solid var(--rule); }
  .right .aux-line a { color: var(--accent); text-decoration: underline; text-underline-offset: 3px; }
</style>
</head>
<body>
<div class="frame">
  <section class="left">
    <div class="top">
      <div class="overline">Chaya · Engine · Vol. 1</div>
      <h1 class="hero">Chaya<span>.</span></h1>
      <p class="copy">
        一个可以 <em>慢慢养成</em>、慢慢像你的 AI 伙伴。<br>
        你给它名字、口气、读过的书。它记得。
      </p>
      <svg class="hand-rule-lg" width="160" height="10" viewBox="0 0 160 10" fill="none">
        <path d="M1 5.2 C 22 3.2, 44 7.2, 66 4.6 S 114 3.4, 136 5.8 S 154 4.2, 159 5.0"
              stroke="var(--accent)" stroke-width="1.4" stroke-linecap="round" stroke-opacity="0.7" fill="none"/>
      </svg>
    </div>

    <div class="marginalia">
      "不急。慢慢来，小店不靠多，靠稳。"<br>
      <span style="font-family: var(--mono); font-size: 10.5px; font-style: normal; letter-spacing: 0.12em;">—— 阿茶，某天下午</span>
    </div>

    <div class="colo">
      <span>© 2026</span>
      <span>v1 · handmade</span>
    </div>
  </section>

  <section class="right">
    <div>
      <div class="form-overline">Welcome back</div>
      <div class="tabs" style="margin-top: 10px;">
        <button class="tab active" type="button">登入</button>
        <span class="tab-sep">/</span>
        <button class="tab" type="button">新来的</button>
      </div>
    </div>

    <form>
      <div class="field">
        <div class="field-label"><span>邮箱</span></div>
        <input type="email" placeholder="you@somewhere.com" autofocus>
      </div>
      <div class="field">
        <div class="field-label"><span>密码</span><span class="field-hint">至少 8 个字符</span></div>
        <input type="password" placeholder="···········">
      </div>

      <button class="submit-btn" type="submit">继续 →</button>
    </form>

    <div class="aux-line">
      <span>忘了？<a>寄一封重置信</a></span>
      <span style="font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; color: var(--pencil-soft);">⌘↵ 继续</span>
    </div>
  </section>
</div>
</body>
</html>
