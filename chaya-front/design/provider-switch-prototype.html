<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>顶栏书签层切换 — 交互原型 v6（三段式顶栏）</title>
<style>
  /* ====== token 与 src/v2/theme.css 同名同值 ====== */
  :root {
    --c-bg:           #ffffff;
    --c-sidebar:      #f9f9f9;
    --c-ink:          #0d0d0d;
    --c-ink-2:        #3c3c3c;
    --c-ink-3:        #6e6e6e;
    --c-ink-4:        #a4a4a4;
    --c-hover:        #ececec;
    --c-hover-soft:   #f2f2f2;
    --c-selected:     #e6e6e6;
    --c-rule:         #ececec;
    --c-accent:       #0d0d0d;
    --c-surface:      #f4f4f4;
    --c-note:         #a8862e;
    --c-warn:         #b45309;
    --c-success:      #2e7d52;
    --c-danger:       #c2410c;
    --c-shadow-card:  0 1px 2px rgba(0,0,0,0.03), 0 8px 24px rgba(0,0,0,0.05);
    --c-shadow-menu:  0 1px 2px rgba(0,0,0,0.04), 0 10px 28px rgba(0,0,0,0.10);
    --c-shadow-pill:  0 1px 2px rgba(0,0,0,0.04), 0 1px 6px rgba(0,0,0,0.05);
    --c-radius-xs: 4px; --c-radius-sm: 6px; --c-radius-md: 8px;
    --c-radius-lg: 10px; --c-radius-xl: 14px;
    --m-instant: 90ms; --m-fast: 160ms; --m-base: 240ms; --m-view: 300ms;
    --c-ease:        cubic-bezier(0.25, 0.8, 0.32, 1);
    --ease-emphasis: cubic-bezier(0.22, 1, 0.36, 1);
    --c-sans: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Inter', 'PingFang SC', system-ui, sans-serif;
    --c-mono: ui-monospace, SFMono-Regular, 'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace;
    --titlebar-h: 48px;
    --sidebar-w: 248px;
    --run-amber: color-mix(in oklab, var(--c-warn) 72%, var(--c-ink-3));
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: var(--c-sans);
    background: var(--c-sidebar);
    color: var(--c-ink);
    overflow: hidden;
    font-size: 14px;
    -webkit-font-smoothing: antialiased;
  }
  button { font: inherit; cursor: pointer; color: inherit; background: none; border: none; }
  button:focus-visible, [tabindex]:focus-visible {
    outline: none;
    box-shadow: inset 0 0 0 1.5px color-mix(in oklab, var(--c-accent) 60%, var(--c-ink));
  }

  /* ================= 全宽顶栏：三段式 ================= */
  /* [红绿灯] ① 大功能切换 ｜ ② provider 段(归属 Code) …… ③ 模块子功能 [侧栏开关][拖窗] */
  .v2-titlebar {
    height: var(--titlebar-h);
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0 10px 0 16px;
    position: relative;
    z-index: 5;
  }
  .v2-dots { display: flex; gap: 8px; margin-right: 6px; flex: 0 0 auto; }
  .v2-dots i { width: 12px; height: 12px; border-radius: 50%; }
  .v2-dots i:nth-child(1) { background: #ff5f57; }
  .v2-dots i:nth-child(2) { background: #febc2e; }
  .v2-dots i:nth-child(3) { background: #28c840; }

  /* —— ① 大功能 chip（对话 / Code / Wiki）：.v2-la-tab 浮起 chip 配方 —— */
  .mods { display: flex; align-items: center; gap: 2px; height: 100%; flex: 0 0 auto; user-select: none; }
  .bmtab {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    height: calc(100% - 14px);
    align-self: center;
    padding: 0 11px 0 10px;
    margin: 0 1px;
    border-radius: var(--c-radius-md);
    color: var(--c-ink-3);
    font-size: 13px;
    white-space: nowrap;
    position: relative;
    transition: background var(--m-fast) var(--c-ease), color 140ms var(--c-ease), box-shadow var(--m-fast) var(--c-ease);
  }
  .bmtab .lb { letter-spacing: 0.005em; }
  .bmtab:hover { background: var(--c-hover-soft); color: var(--c-ink-2); }
  .bmtab.active {
    background: var(--c-bg);
    color: var(--c-ink);
    box-shadow:
      inset 0 0 0 1px var(--c-rule),
      0 2px 5px -3px color-mix(in oklab, var(--c-ink) 26%, transparent);
  }
  .bmtab.active .lb { font-weight: 600; }
  .bmtab .ico {
    width: 15px; height: 15px;
    display: grid; place-items: center;
    color: var(--c-ink-4);
    flex: 0 0 auto;
    transition: color 140ms var(--c-ease);
  }
  .bmtab .ico svg { width: 15px; height: 15px; }
  .bmtab:hover .ico { color: var(--c-ink-3); }
  .bmtab.active .ico { color: var(--c-ink-2); }
  /* Code chip 激活时尾随当前 provider 名（.v2-la-tab 的 proj·sess 配方） */
  .bmtab .sess { color: var(--c-ink-3); font-size: 12.5px; }
  .bmtab .sep2 { color: var(--c-ink-4); }
  /* 未读墨点（对话）：.v2-la-tab .unread 同款 */
  .bmtab .unread {
    width: 6px; height: 6px; border-radius: 50%;
    background: color-mix(in oklab, var(--c-accent) 55%, var(--c-ink-3));
    flex: 0 0 auto;
    animation: unread-in var(--m-base) var(--c-ease) both;
  }
  @keyframes unread-in { from { opacity: 0; transform: scale(0.6); } to { opacity: 1; transform: scale(1); } }

  .tnav-sep { flex: 0 0 1px; width: 1px; height: 18px; margin: 0 6px; background: var(--c-rule); }

  /* —— ② provider 书签栏：夹在侧栏与主卡之间，依附主卡左上角。
        provider = 同一工作目录的不同执行器，所以书签贴着工作区（主卡）而非顶栏。 —— */
  .prov-rail {
    width: 42px;
    flex: 0 0 auto;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
    padding-top: 14px;          /* 顶部对齐主卡上缘往下一点，"挂"在左上角 */
    margin-right: -7px;         /* 吃掉 app gap(6) + 卡边线(1)，激活签与主卡相连 */
    position: relative;
    z-index: 30;
    user-select: none;
    transition: opacity var(--m-fast) var(--c-ease);
  }
  /* 不在 Code 模块时降噪（仍可点，点了直达该 provider；角标保持可见） */
  .prov-rail.dim { opacity: 0.55; }
  .prov-rail.dim:hover { opacity: 1; }
  .pv {
    width: 38px; height: 38px;
    border: 1px solid transparent;
    border-right: none;
    border-radius: var(--c-radius-lg) 0 0 var(--c-radius-lg);
    display: grid; place-items: center;
    position: relative;
    transition: background var(--m-fast) var(--c-ease),
                transform var(--m-base) var(--ease-emphasis),
                border-color var(--m-fast) var(--c-ease);
  }
  .pv:hover { background: var(--c-hover-soft); }
  /* 激活：与主卡同色相连（盖住卡左边线），像真夹进当前这页 */
  .pv.active {
    background: var(--c-bg);
    border-color: var(--c-rule);
    transform: translateX(2px);
    box-shadow: -3px 0 6px -4px color-mix(in oklab, var(--c-ink) 30%, transparent);
  }
  /* 静止态低饱和：保留色相可辨，但不喧宾夺主（letterpress「克制用色」）。
     激活/hover 才显完整品牌色 —— 当前执行器才是唯一的强调点。 */
  .pv .glyph {
    width: 22px; height: 22px;
    border-radius: var(--c-radius-sm);
    display: grid; place-items: center;
    font-size: 9.5px; font-weight: 700; letter-spacing: 0.02em;
    color: color-mix(in oklab, var(--brand) 68%, var(--c-ink-3));
    background: color-mix(in oklab, var(--brand) 13%, var(--c-surface));
    box-shadow: inset 0 0 0 1px color-mix(in oklab, var(--brand) 20%, transparent);
    transition: color var(--m-fast) var(--c-ease), background var(--m-fast) var(--c-ease),
                box-shadow var(--m-fast) var(--c-ease);
  }
  .pv:hover .glyph {
    color: color-mix(in oklab, var(--brand) 88%, var(--c-ink));
    background: color-mix(in oklab, var(--brand) 20%, var(--c-surface));
  }
  .pv.active .glyph {
    color: #fff;
    background: var(--brand);
    box-shadow: 0 1px 3px -1px color-mix(in oklab, var(--brand) 55%, transparent);
  }
  /* 浮签在书签右侧出（不挡书签列） */
  .prov-rail .pv .tipbox {
    left: calc(100% + 12px);
    top: 50%;
    translate: 0 -50%;
    transform: translateX(-4px);
  }
  .prov-rail .pv:hover .tipbox { transform: translateX(0); }
  /* 角标：运行琥珀呼吸点（>1 带数泡）/ 后台完成绿点 */
  .pv .rundot {
    position: absolute; top: 2px; right: 2px;
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--run-amber);
    animation: la-breathe 1.2s var(--c-ease) infinite;
  }
  @keyframes la-breathe { 50% { opacity: 0.35; } }
  .pv .runn {
    position: absolute; top: -5px; right: -4px;
    background: var(--c-bg);
    border: 1px solid var(--c-rule);
    border-radius: 999px;
    min-width: 14px;
    padding: 0 3px;
    font-size: 9.5px;
    line-height: 13px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    text-align: center;
    color: var(--run-amber);
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  }
  .prov-rail .pv .runn { top: -4px; right: 4px; }
  .pv .donedot {
    position: absolute; bottom: 2px; right: 5px;
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--c-success);
    animation: unread-in var(--m-base) var(--c-ease) both;
  }
  .pv.just-done { animation: donepulse 900ms var(--ease-emphasis); }
  @keyframes donepulse {
    0%   { background: rgba(46,125,82,0.14); }
    100% { background: transparent; }
  }
  .pv.active.just-done { animation: none; }

  /* hover 摘要浮签（chip 与 provider 方格共用） */
  .tipbox {
    position: absolute;
    left: 50%; top: calc(100% + 9px);
    translate: -50% 0;
    background: var(--c-bg);
    border: 1px solid var(--c-rule);
    box-shadow: var(--c-shadow-menu);
    color: var(--c-ink-2);
    font-size: 12px;
    line-height: 1.5;
    padding: 6px 10px;
    border-radius: var(--c-radius-md);
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transform: translateY(-3px);
    transition: opacity var(--m-fast) var(--c-ease), transform var(--m-fast) var(--c-ease);
    z-index: 99;
  }
  .bmtab:hover .tipbox, .pv:hover .tipbox { opacity: 1; transform: translateY(0); }
  .tipbox strong { color: var(--c-ink); font-weight: 600; }
  .tipbox em { font-style: normal; color: var(--run-amber); }
  .tipbox b  { font-weight: 600; color: var(--c-success); }
  .tipbox u  { text-decoration: none; font-weight: 600; color: var(--c-ink); }

  .tb-grow { flex: 1 1 auto; min-width: 0; }

  /* —— ③ 模块子功能开关（右侧，.v2-pin / .v2-titlebar-collapse 形制） —— */
  .subfns { display: flex; align-items: center; gap: 2px; flex: 0 0 auto; }
  .v2-pin {
    width: 30px; height: 30px;
    border-radius: var(--c-radius-md);
    display: grid; place-items: center;
    color: var(--c-ink-4);
    flex: 0 0 auto;
    position: relative;
    transition: background var(--m-instant) var(--c-ease), color var(--m-instant) var(--c-ease);
  }
  .v2-pin:hover { color: var(--c-ink); background: var(--c-hover-soft); }
  .v2-pin.active { color: var(--c-ink); background: var(--c-hover); }
  .v2-pin svg { width: 16px; height: 16px; }
  .v2-drag { color: var(--c-ink-4); padding: 0 4px; flex: 0 0 auto; }

  /* ================= app 区：侧栏 + 主浮卡 ================= */
  .v2-app {
    display: flex;
    height: calc(100vh - var(--titlebar-h));
    gap: 6px;
    padding: 0 10px 10px 10px;
  }
  .v2-side {
    width: var(--sidebar-w);
    flex: none;
    display: flex;
    flex-direction: column;
    min-height: 0;
    padding-top: 2px;
  }
  .v2-side.hidden { display: none; }
  .side-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 14px 6px;
  }
  .side-head .ttl { font-size: 12px; font-weight: 650; color: var(--c-ink-2); }
  .side-head .add {
    width: 22px; height: 22px;
    border-radius: var(--c-radius-sm);
    display: grid; place-items: center;
    color: var(--c-ink-3);
    font-size: 14px;
  }
  .side-head .add:hover { background: var(--c-hover-soft); color: var(--c-ink); }
  .side-list {
    flex: 1;
    overflow-y: auto;
    padding: 0 8px 10px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    animation: fadeUp 200ms var(--c-ease) both;
  }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
  .side-row {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 7px 10px;
    border-radius: var(--c-radius-md);
    font-size: 13px;
    color: var(--c-ink-2);
    cursor: pointer;
    transition: background 140ms var(--c-ease);
  }
  .side-row:hover { background: var(--c-hover-soft); }
  .side-row.active { background: var(--c-hover); color: var(--c-ink); }
  .side-row.active .nm { font-weight: 600; }
  .side-row .st { width: 6px; height: 6px; border-radius: 50%; flex: none; background: transparent; }
  .side-row .st.running { background: var(--run-amber); animation: la-breathe 1.2s var(--c-ease) infinite; }
  .side-row .st.done { background: var(--c-success); }
  .side-row .st.open { background: #d5d5d5; }
  .side-row .nm { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .side-row .mt { font-family: var(--c-mono); font-size: 10.5px; color: var(--c-ink-4); flex: none; }

  /* —— 主浮卡：层叠舞台 —— */
  .stage { flex: 1; position: relative; min-width: 0; }
  .stage::before, .stage::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: var(--c-radius-xl);
    border: 1px solid var(--c-rule);
    background: #f7f6f4;
    z-index: 1;
  }
  /* 安静的纸叠暗示：只往右下露一线，不抢戏 */
  .stage::before { transform: translate(3px, 5px) scale(0.994); opacity: 0.45; }
  .stage::after  { transform: translate(1.5px, 2.5px) scale(0.997); opacity: 0.7; background: #fafafa; }

  .layer {
    position: absolute;
    inset: 0;
    border-radius: var(--c-radius-xl);
    border: 1px solid var(--c-rule);
    background: var(--c-bg);
    box-shadow:
      0 1px 2px rgba(0,0,0,0.03),
      0 12px 32px -8px rgba(0,0,0,0.08);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    z-index: 2;
    opacity: 0;
    transform: translateY(5px) scale(0.992);
    pointer-events: none;
    transition: opacity var(--m-view) var(--ease-emphasis),
                transform var(--m-view) var(--ease-emphasis);
  }
  .layer.active { opacity: 1; transform: none; pointer-events: auto; z-index: 10; }
  .layer.below  { opacity: 0; transform: translate(2px, 4px) scale(0.996); z-index: 3; }

  /* —— 层内二级 tab 条 —— */
  .tabstrip {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 8px 12px 0;
    flex: none;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabstrip::-webkit-scrollbar { display: none; }
  .tabstrip .hint { margin-left: auto; font-size: 11px; color: var(--c-ink-4); flex: none; padding-right: 4px; }
  .tab {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 6px 8px 6px 11px;
    border: 1px solid transparent;
    border-bottom: none;
    border-radius: var(--c-radius-md) var(--c-radius-md) 0 0;
    font-size: 12.5px;
    color: var(--c-ink-3);
    white-space: nowrap;
    cursor: pointer;
    max-width: 200px;
    transition: background var(--m-instant) var(--c-ease), color var(--m-instant) var(--c-ease);
  }
  .tab:hover { background: var(--c-hover-soft); color: var(--c-ink-2); }
  .tab.selected {
    background: var(--c-bg);
    border-color: var(--c-rule);
    color: var(--c-ink);
    font-weight: 600;
    margin-bottom: -1px;
    padding-bottom: 7px;
  }
  .tab .t-label { overflow: hidden; text-overflow: ellipsis; }
  .tab .dot { width: 6px; height: 6px; border-radius: 50%; flex: none; }
  .tab .dot.running { background: var(--run-amber); animation: la-breathe 1.2s var(--c-ease) infinite; }
  .tab .dot.done { background: var(--c-success); }
  .tab .dot.idle { background: #d5d5d5; }
  .tab-x {
    flex: none;
    width: 17px; height: 17px;
    border-radius: var(--c-radius-xs);
    color: var(--c-ink-4);
    font-size: 12px;
    line-height: 1;
    display: grid; place-items: center;
    opacity: 0;
    transition: opacity var(--m-instant) var(--c-ease), background var(--m-instant) var(--c-ease);
  }
  .tab:hover .tab-x, .tab.selected .tab-x { opacity: 1; }
  .tab-x:hover { background: var(--c-hover); color: var(--c-danger); }
  .tab-x:active { transform: scale(0.9); }
  .tabstrip-rule { height: 1px; background: var(--c-rule); flex: none; }

  .layer-main { flex: 1; display: flex; flex-direction: column; min-height: 0; }

  .btn {
    font-size: 12.5px;
    color: var(--c-ink-2);
    background: var(--c-bg);
    border: 1px solid var(--c-rule);
    border-radius: var(--c-radius-sm);
    padding: 5px 11px;
    transition: background var(--m-instant) var(--c-ease), border-color var(--m-instant) var(--c-ease);
  }
  .btn:hover { background: var(--c-hover-soft); border-color: #ddd; }
  .btn:active { background: var(--c-hover); }
  .btn.primary { color: #fff; background: var(--c-accent); border-color: var(--c-accent); font-weight: 550; }
  .btn.primary:hover { background: #000; }
  .btn.stop:hover { color: var(--c-danger); border-color: rgba(194,65,12,0.35); }
  .btn.tiny { padding: 3px 9px; font-size: 11.5px; border-radius: var(--c-radius-xs); }

  .statusline {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 16px;
    border-bottom: 1px solid var(--c-rule);
    flex: none;
    min-height: 38px;
  }
  .statusline .t-state { font-family: var(--c-mono); font-size: 11px; color: var(--c-ink-4); }
  .statusline .t-state.running { color: var(--run-amber); }
  .statusline .t-state.done { color: var(--c-success); }
  .statusline .spacer { flex: 1; }

  .transcript {
    flex: 1;
    overflow-y: auto;
    padding: 14px 18px;
    font-family: var(--c-mono);
    font-size: 12px;
    line-height: 1.85;
    color: var(--c-ink-3);
  }
  .transcript .tl-user { color: var(--c-ink); font-weight: 600; }
  .transcript .tl-user::before { content: "❯ "; color: var(--c-ink-4); }
  .transcript .tl-tool::before { content: "⏺ "; color: var(--c-note); }
  .transcript .tl-ok { color: var(--c-success); }
  .transcript .tl-ok::before { content: "✓ "; }
  .transcript .tl-caret {
    display: inline-block;
    width: 7px; height: 13px;
    background: var(--c-note);
    vertical-align: -2px;
    animation: blink 1.1s steps(1) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  .chatlog {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .msg { max-width: 68%; line-height: 1.6; font-size: 13.5px; }
  .msg.user {
    align-self: flex-end;
    background: var(--c-surface);
    border-radius: var(--c-radius-xl) var(--c-radius-xl) var(--c-radius-xs) var(--c-radius-xl);
    padding: 9px 13px;
  }
  .msg.ai { align-self: flex-start; color: var(--c-ink-2); padding: 2px 2px; }
  .msg.ai.pending { color: var(--c-ink-4); font-style: italic; }

  .wikidoc { flex: 1; overflow-y: auto; padding: 26px 36px; max-width: 720px; }
  .wikidoc h2 { font-size: 19px; font-weight: 700; letter-spacing: -0.01em; margin-bottom: 4px; }
  .wikidoc .doc-meta { font-size: 11.5px; color: var(--c-ink-4); margin-bottom: 16px; }
  .wikidoc [contenteditable] {
    outline: none;
    font-size: 13.5px;
    line-height: 1.85;
    color: var(--c-ink-2);
    min-height: 200px;
  }
  .wikidoc [contenteditable] p { margin-bottom: 10px; }

  .composer {
    flex: none;
    display: flex;
    gap: 8px;
    padding: 12px 16px 14px;
    border-top: 1px solid var(--c-rule);
  }
  .composer input {
    flex: 1;
    font: inherit;
    font-size: 13px;
    color: var(--c-ink);
    background: var(--c-bg);
    border: 1px solid var(--c-rule);
    border-radius: var(--c-radius-lg);
    padding: 8px 13px;
    outline: none;
    transition: border-color var(--m-fast) var(--c-ease);
  }
  .composer input:focus { border-color: var(--c-ink-4); }
  .composer input::placeholder { color: var(--c-ink-4); }

  .empty-note {
    color: var(--c-ink-4);
    font-size: 12.5px;
    padding: 60px 16px 24px;
    text-align: center;
    line-height: 1.7;
  }

  .legend {
    position: fixed;
    right: 22px; bottom: 20px;
    font-size: 11px;
    color: var(--c-ink-3);
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(4px);
    border: 1px solid var(--c-rule);
    border-radius: var(--c-radius-md);
    padding: 8px 12px;
    line-height: 1.8;
    z-index: 50;
    max-width: 330px;
  }
  .legend i { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 5px; }
  .legend .tip2 { border-top: 1px dashed var(--c-rule); margin-top: 5px; padding-top: 5px; color: var(--c-ink-4); }

  @media (prefers-reduced-motion: reduce) {
    .layer, .bmtab, .pv, .tipbox, .side-list { transition: none; animation: none; }
    .pv .rundot, .tab .dot.running, .side-row .st.running, .transcript .tl-caret { animation: none; }
    .pv.just-done { animation: none; }
  }
</style>
</head>
<body>

<!-- ================= 顶栏：① 大功能 ｜ ② provider 段 …… ③ 子功能 ================= -->
<header class="v2-titlebar">
  <div class="v2-dots" aria-hidden="true"><i></i><i></i><i></i></div>

  <nav class="mods" id="mods" aria-label="功能切换"></nav>

  <span class="tb-grow" aria-hidden="true"></span>

  <div class="subfns" id="subfns" aria-label="当前模块子功能"></div>
  <button type="button" class="v2-pin" title="收起/展开侧栏" aria-label="收起/展开侧栏" id="side-toggle">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" aria-hidden="true"><rect x="3" y="4" width="18" height="16" rx="2"/><line x1="9" y1="4" x2="9" y2="20"/></svg>
  </button>
  <div class="v2-drag" title="拖动窗口" aria-hidden="true">
    <svg viewBox="0 0 24 24" width="15" height="15" fill="currentColor"><circle cx="9" cy="6" r="1.4"/><circle cx="15" cy="6" r="1.4"/><circle cx="9" cy="12" r="1.4"/><circle cx="15" cy="12" r="1.4"/><circle cx="9" cy="18" r="1.4"/><circle cx="15" cy="18" r="1.4"/></svg>
  </div>
</header>

<div class="v2-app">
  <aside class="v2-side" id="side"></aside>
  <!-- provider 书签：夹在侧栏与主卡之间，依附主卡左上角（工作目录多 provider 共享） -->
  <nav class="prov-rail" id="prov-rail" aria-label="Provider 切换"></nav>
  <main class="stage" id="stage"></main>
</div>

<div class="legend">
  <div>顶栏：大功能切换 + 右侧子功能；provider 书签依附主卡左上角（侧栏与主卡之间）</div>
  <div><i style="background:var(--run-amber)"></i>运行中 ·
       <i style="background:var(--c-success)"></i>后台完成 ·
       <i style="background:color-mix(in oklab, var(--c-accent) 55%, var(--c-ink-3))"></i>对话未读（切回即消）</div>
  <div class="tip2">工作目录多 provider 共享（侧栏标题 chaya-next · 执行器）；不在 code 时书签栏降噪，点任意书签直达该 provider。</div>
</div>

<script>
/* ================== 数据 ================== */
const PROVIDERS = [
  { id: 'claude',   name: 'Claude',   glyph: 'CL', color: '#d97757' },
  { id: 'codex',    name: 'Codex',    glyph: 'CX', color: '#1a1a1a' },
  { id: 'cursor',   name: 'Cursor',   glyph: 'CU', color: '#5b5bd6' },
  { id: 'gemini',   name: 'Gemini',   glyph: 'GM', color: '#3b82f6' },
  { id: 'copilot',  name: 'Copilot',  glyph: 'CP', color: '#0969da' },
  { id: 'opencode', name: 'OpenCode', glyph: 'OC', color: '#2e7d52' },
];
/* 层 = chat + wiki + 每个 provider */
const LAYERS = ['chat', 'wiki', ...PROVIDERS.map(p => p.id)];
const ICONS = {
  chat: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-8.5 8.5 8.5 8.5 0 0 1-3.8-.9L3 21l1.9-5.7a8.5 8.5 0 1 1 16.1-3.8z"/></svg>',
  code: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>',
  wiki: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>',
  notes: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>',
  diff: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>',
  robot: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15.5 13.5"/></svg>',
  review: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3 8-8"/><path d="M20 12v6a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h9"/></svg>',
  search: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/></svg>',
  plus: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>',
  tree: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>',
};
/* ③ 各模块右侧子功能（占位开关：点了 toggle 激活态） */
const SUBFNS = {
  chat: [
    { id: 'new',    icon: 'plus',   tip: '新建会话' },
    { id: 'search', icon: 'search', tip: '搜索会话' },
  ],
  code: [
    { id: 'notes',  icon: 'notes',  tip: 'Wiki 笔记栏', toggle: true, group: 'inspect' },
    { id: 'diff',   icon: 'diff',   tip: '代码改动栏',  toggle: true, group: 'inspect' },
    { id: 'auto',   icon: 'robot',  tip: '自动化任务',  toggle: true, group: 'inspect' },
    { id: 'review', icon: 'review', tip: '评审',        toggle: true, group: 'inspect' },
  ],
  wiki: [
    { id: 'tree',   icon: 'tree',   tip: '文档列表栏', toggle: true },
    { id: 'new',    icon: 'plus',   tip: '新建文档' },
  ],
};

const FAKE_STEPS = [
  '读取 src/v2/theme.css …',
  '定位相关组件与样式引用',
  '编辑 3 个文件，运行 tsc --noEmit',
  '类型检查通过，自测渲染正常',
];
const FAKE_REPLIES = [
  '可以的。顶栏三段：大功能切换、provider 段、右侧子功能 —— 职责各归各。',
  '收到。provider 段只在 Code 里是"当前上下文"，其他模块降噪但保留状态角标。',
  '理解 —— 被切走的层保留状态不卸载，CLI 进程不中断，切回即恢复。',
];

let seq = 0;
function mkItem(name, st, opts = {}) {
  return Object.assign({
    id: 'T' + (++seq), name, st, secs: 0,
    prompt: name, step: st === 'done' ? FAKE_STEPS.length : 0,
    timer: null, msgs: [], body: '', open: true,
  }, opts);
}

const state = {};
LAYERS.forEach(id => { state[id] = { items: [], selected: null, unseen: 0 }; });
const fnState = { chat: {}, code: {}, wiki: {} };   /* ③ 子功能开关态 */

(() => {
  const c1 = mkItem('界面方案讨论', 'idle');
  c1.msgs = [
    { who: 'user', text: '多 provider 的切换交互怎么做比较好？' },
    { who: 'ai',   text: '顶栏三段式：大功能 chip、provider 方格段、右侧子功能开关。切换走层淡入淡出。' },
  ];
  const c2 = mkItem('周报草稿', 'idle');
  c2.msgs = [{ who: 'user', text: '帮我列一下本周改动要点' }, { who: 'ai', text: '本周：三层玻璃、MCP OAuth、评审分屏、provider 动态模型。' }];
  const c3 = mkItem('竞品调研', 'idle', { open: false });
  c3.msgs = [{ who: 'user', text: '看下同类产品的多 agent 切换' }, { who: 'ai', text: '已整理三家：偏 IDE 的用底部面板，偏 chat 的用左侧列表。' }];
  state.chat.items = [c1, c2, c3];
  state.chat.selected = c1.id;

  const w1 = mkItem('速记.md', 'idle');
  w1.body = '<p>· 顶栏三段：大功能 / provider / 子功能</p><p>· 待办：ClientShell 层容器、TopTabs 改书签</p>';
  const w2 = mkItem('设计决策.md', 'idle');
  w2.body = '<p>tab 同质化原则：同一时刻可见的二级 tab 必须属于同一模块。</p><p>跨模块切换全部走顶栏 + 层淡入淡出。</p>';
  const w3 = mkItem('FBOT.md', 'idle', { open: false });
  w3.body = '<p>飞书 bot 文档（未打开 tab，从侧栏点开）。</p>';
  state.wiki.items = [w1, w2, w3];
  state.wiki.selected = w1.id;

  const s1 = mkItem('重构 theme.css 变量', 'running'); s1.secs = 96; s1.step = 2;
  const s2 = mkItem('修 i18n 字典缺 key', 'idle');
  state.claude.items = [s1, s2];
  state.claude.selected = s1.id;
  scheduleFinish('claude', s1, 24000);

  const s3 = mkItem('评审 localAgent.cjs', 'done'); s3.secs = 252;
  state.codex.items = [s3];
  state.codex.selected = s3.id;
})();

/* 模块态：chat | code | wiki；code 模块再带一个当前 provider */
let activeMod = 'chat';
let activeProv = 'claude';
let prevLayer = null;
const layerOf = () => activeMod === 'code' ? activeProv : activeMod;

/* ================== 骨架 ================== */
const $mods = document.getElementById('mods');
const $provRail = document.getElementById('prov-rail');
const $subfns = document.getElementById('subfns');
const $side = document.getElementById('side');
const $stage = document.getElementById('stage');
document.getElementById('side-toggle').addEventListener('click', () => $side.classList.toggle('hidden'));

/* ① 大功能 chip */
[
  { id: 'chat', name: '对话' },
  { id: 'code', name: 'code' },
  { id: 'wiki', name: 'wiki' },
].forEach(mod => {
  const bt = document.createElement('button');
  bt.type = 'button';
  bt.className = 'bmtab';
  bt.id = 'mod-' + mod.id;
  bt.setAttribute('aria-label', mod.name);
  bt.addEventListener('click', () => switchMod(mod.id));
  $mods.appendChild(bt);
});

/* ② provider 书签（依附主卡左上角） */
PROVIDERS.forEach(p => {
  const pv = document.createElement('button');
  pv.type = 'button';
  pv.className = 'pv';
  pv.id = 'pv-' + p.id;
  pv.style.setProperty('--brand', p.color);
  pv.setAttribute('aria-label', p.name);
  pv.addEventListener('click', () => switchProv(p.id));
  $provRail.appendChild(pv);
});

/* 层 */
LAYERS.forEach(id => {
  const layer = document.createElement('section');
  layer.className = 'layer';
  layer.id = 'layer-' + id;
  layer.innerHTML = `
    <div class="tabstrip" id="tabs-${id}"></div>
    <div class="tabstrip-rule"></div>
    <div class="layer-main" id="main-${id}"></div>`;
  $stage.appendChild(layer);
});

/* ================== 渲染 ================== */
function render(force = false) {
  /* ① 大功能 chip */
  const chatUnseen = state.chat.unseen;
  const codeRunning = PROVIDERS.reduce((n, p) => n + state[p.id].items.filter(x => x.st === 'running').length, 0);
  const codeUnseen = PROVIDERS.reduce((n, p) => n + state[p.id].unseen, 0);
  const provName = PROVIDERS.find(p => p.id === activeProv).name;

  setChip('mod-chat', activeMod === 'chat', `
    <span class="ico" aria-hidden="true">${ICONS.chat}</span><span class="lb">对话</span>
    ${chatUnseen && activeMod !== 'chat' ? '<span class="unread" aria-hidden="true"></span>' : ''}
    <span class="tipbox" role="tooltip"><strong>对话</strong>${chatUnseen ? ` · <u>${chatUnseen} 条新回复</u>` : ''}</span>`);
  setChip('mod-code', activeMod === 'code', `
    <span class="ico" aria-hidden="true">${ICONS.code}</span><span class="lb">code</span>
    ${activeMod === 'code' ? `<span class="sep2">·</span><span class="sess">${provName}</span>` : ''}
    <span class="tipbox" role="tooltip"><strong>code</strong>${codeRunning ? ` · <em>${codeRunning} 个运行中</em>` : ''}${codeUnseen ? ` · <b>${codeUnseen} 个已完成</b>` : ''}</span>`);
  setChip('mod-wiki', activeMod === 'wiki', `
    <span class="ico" aria-hidden="true">${ICONS.wiki}</span><span class="lb">wiki</span>
    <span class="tipbox" role="tooltip"><strong>wiki</strong> · ${state.wiki.items.length} 篇</span>`);

  /* ② provider 书签栏 */
  $provRail.classList.toggle('dim', activeMod !== 'code');
  PROVIDERS.forEach(p => {
    const s = state[p.id];
    const running = s.items.filter(x => x.st === 'running').length;
    const isActive = activeMod === 'code' && activeProv === p.id;
    const showDone = s.unseen > 0 && layerOf() !== p.id;
    const pv = document.getElementById('pv-' + p.id);
    pv.classList.toggle('active', isActive);
    const tipBits = [`<strong>${p.name}</strong>`];
    if (running) tipBits.push(`<em>${running} 个运行中</em>`);
    if (s.unseen) tipBits.push(`<b>${s.unseen} 个已完成</b>`);
    pv.innerHTML = `
      <span class="glyph" aria-hidden="true">${p.glyph}</span>
      ${running ? '<span class="rundot" aria-hidden="true"></span>' : ''}
      ${running > 1 ? `<span class="runn">${running}</span>` : ''}
      ${showDone ? '<span class="donedot" aria-hidden="true"></span>' : ''}
      <span class="tipbox" role="tooltip">${tipBits.join(' · ')}</span>`;
  });

  /* ③ 子功能（随模块变化） */
  renderSubfns();

  /* 层显隐 */
  const cur = layerOf();
  LAYERS.forEach(id => {
    const layer = document.getElementById('layer-' + id);
    layer.classList.toggle('active', id === cur);
    layer.classList.toggle('below', id === prevLayer && id !== cur);
  });

  LAYERS.forEach(id => { renderTabs(id); renderMain(id, force); });
  renderSide();
}

function setChip(id, active, html) {
  const el = document.getElementById(id);
  el.classList.toggle('active', active);
  el.innerHTML = html;
}

function renderSubfns() {
  const fns = SUBFNS[activeMod];
  const st = fnState[activeMod];
  $subfns.innerHTML = fns.map(f => `
    <button type="button" class="v2-pin ${st[f.id] ? 'active' : ''}" data-fn="${f.id}"
            title="${f.tip}" aria-label="${f.tip}" aria-pressed="${!!st[f.id]}">${ICONS[f.icon]}</button>`).join('');
  $subfns.querySelectorAll('[data-fn]').forEach(el => {
    el.addEventListener('click', () => {
      const f = fns.find(x => x.id === el.dataset.fn);
      if (f.id === 'new') { addItem(layerOf()); return; }
      if (f.toggle) {
        const was = st[f.id];
        if (f.group) fns.filter(x => x.group === f.group).forEach(x => { st[x.id] = false; });  /* 同组互斥 */
        st[f.id] = !was;
        renderSubfns();
      }
    });
  });
}

function renderSide() {
  const cur = layerOf();
  const s = state[cur];
  /* code 模块：工作目录多 provider 共享，标题展示共享项目 + 当前执行器 */
  const title = activeMod === 'chat' ? '会话'
              : activeMod === 'wiki' ? '笔记'
              : 'chaya-next · ' + PROVIDERS.find(p => p.id === cur).name;
  $side.innerHTML = `
    <div class="side-head">
      <span class="ttl">${title}</span>
      <button type="button" class="add" data-add aria-label="新建">＋</button>
    </div>
    <div class="side-list">
      ${s.items.map(t => `
        <div class="side-row ${t.id === s.selected ? 'active' : ''}" data-row="${t.id}" tabindex="0">
          <span class="st ${t.st === 'running' ? 'running' : t.st === 'done' ? 'done' : t.open ? 'open' : ''}"></span>
          <span class="nm">${esc(t.name)}</span>
          ${t.st === 'running' ? `<span class="mt">${fmt(t.secs)}</span>` : ''}
        </div>`).join('') || '<div class="empty-note" style="padding-top:30px">空空如也</div>'}
    </div>`;
  $side.querySelectorAll('.side-row').forEach(el => {
    const pick = () => {
      const t = s.items.find(x => x.id === el.dataset.row);
      if (t) { t.open = true; s.selected = t.id; render(); }
    };
    el.addEventListener('click', pick);
    el.addEventListener('keydown', e => { if (e.key === 'Enter') pick(); });
  });
  $side.querySelector('[data-add]').addEventListener('click', () => addItem(cur));
}

function addItem(layerId) {
  const s = state[layerId];
  const isWiki = layerId === 'wiki';
  const t = mkItem(isWiki ? '未命名.md' : '新会话', 'idle');
  if (isWiki) t.body = '<p></p>';
  s.items.unshift(t);
  s.selected = t.id;
  render();
  document.getElementById('input-' + layerId)?.focus();
}

function kindOf(id) { return id === 'chat' ? 'chat' : id === 'wiki' ? 'wiki' : 'cli'; }

function renderTabs(id) {
  const s = state[id];
  const kind = kindOf(id);
  const $tabs = document.getElementById('tabs-' + id);
  const kindLb = kind === 'chat' ? '会话 tabs' : kind === 'wiki' ? '文档 tabs' : 'CLI 会话 tabs';
  const open = s.items.filter(t => t.open);
  $tabs.innerHTML = open.map(t => `
    <div class="tab ${t.id === s.selected ? 'selected' : ''}" data-tab="${t.id}" tabindex="0">
      ${kind === 'cli' ? `<span class="dot ${t.st}"></span>` : ''}
      <span class="t-label">${esc(t.name)}</span>
      <button type="button" class="tab-x" data-del="${t.id}" aria-label="关闭 tab">×</button>
    </div>`).join('')
    + `<span class="hint">这一层只有${kindLb}</span>`;

  $tabs.querySelectorAll('.tab').forEach(el => {
    const pick = () => { s.selected = el.dataset.tab; render(); };
    el.addEventListener('click', pick);
    el.addEventListener('keydown', e => { if (e.key === 'Enter') pick(); });
  });
  $tabs.querySelectorAll('.tab-x').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const t = s.items.find(x => x.id === el.dataset.del);
      if (t) t.open = false;
      if (s.selected === el.dataset.del) {
        const next = s.items.find(x => x.open);
        s.selected = next?.id || null;
      }
      render();
    });
  });
}

function renderMain(id, force = false) {
  const s = state[id];
  const kind = kindOf(id);
  const t = s.items.find(x => x.id === s.selected && x.open);
  const $main = document.getElementById('main-' + id);

  if (!force && $main.contains(document.activeElement) &&
      (document.activeElement.tagName === 'INPUT' || document.activeElement.isContentEditable)) {
    return;
  }

  if (!t) {
    $main.innerHTML = `<div class="empty-note">没有打开的 tab —— 从左侧列表点开，或点「＋」新建</div>`;
    return;
  }

  if (kind === 'chat') {
    $main.innerHTML = `
      <div class="chatlog" id="log-${id}">
        ${t.msgs.map(x => `<div class="msg ${x.who} ${x.pending ? 'pending' : ''}">${esc(x.text)}</div>`).join('')
          || '<div class="empty-note">新会话 —— 说点什么</div>'}
      </div>
      <div class="composer">
        <input id="input-${id}" placeholder="发消息（回复约 6s 后到达，切走可看「对话」chip 的未读点）">
        <button type="button" class="btn primary" data-send>发送</button>
      </div>`;
    wireComposer(id, () => sendChat(id));
    const log = document.getElementById('log-' + id);
    log.scrollTop = log.scrollHeight;

  } else if (kind === 'wiki') {
    $main.innerHTML = `
      <div class="wikidoc">
        <h2>${esc(t.name)}</h2>
        <div class="doc-meta">wiki 文档 · 可直接编辑正文</div>
        <div contenteditable="true" data-doc>${t.body}</div>
      </div>`;
    $main.querySelector('[data-doc]').addEventListener('input', e => { t.body = e.target.innerHTML; });

  } else {
    const pname = PROVIDERS.find(p => p.id === id).name;
    const lines = [];
    if (t.st === 'idle' && t.step === 0 && t.name === '新会话') {
      lines.push(`<div class="empty-note">空会话 —— 在下方输入任务并发送</div>`);
    } else {
      lines.push(`<div class="tl-user">${esc(t.prompt)}</div>`);
      for (let i = 0; i < t.step; i++) lines.push(`<div class="tl-tool">${FAKE_STEPS[i]}</div>`);
      if (t.st === 'running') lines.push(`<div><span class="tl-caret"></span></div>`);
      else if (t.st === 'done') lines.push(`<div class="tl-ok">完成 —— 改动已写入工作区（用时 ${fmt(t.secs)}）</div>`);
      else if (t.st === 'idle' && t.step === 0) lines.push(`<div style="opacity:0.6">（已停止）</div>`);
    }
    $main.innerHTML = `
      <div class="statusline">
        <span class="t-state ${t.st}">${metaOf(t)}</span>
        <span class="spacer"></span>
        ${t.st === 'running' ? `<button type="button" class="btn tiny stop" data-stop>■ 停止</button>` : ''}
        ${t.st === 'done' ? `<button type="button" class="btn tiny" data-rerun>↻ 重跑</button>` : ''}
      </div>
      <div class="transcript" id="log-${id}">${lines.join('')}</div>
      <div class="composer">
        <input id="input-${id}" placeholder="给 ${pname} 一个任务（约 10s 跑完，切走可看 provider 方格角标）">
        <button type="button" class="btn primary" data-send>发送</button>
      </div>`;
    $main.querySelector('[data-stop]')?.addEventListener('click', () => { if (t.timer) clearTimeout(t.timer); t.st = 'idle'; t.step = 0; render(); });
    $main.querySelector('[data-rerun]')?.addEventListener('click', () => { t.st = 'running'; t.secs = 0; t.step = 0; scheduleFinish(id, t, 10000); render(); });
    wireComposer(id, () => sendCli(id));
    const log = document.getElementById('log-' + id);
    log.scrollTop = log.scrollHeight;
  }
}

function wireComposer(id, fn) {
  const $main = document.getElementById('main-' + id);
  $main.querySelector('[data-send]')?.addEventListener('click', fn);
  $main.querySelector('input')?.addEventListener('keydown', e => { if (e.key === 'Enter') fn(); });
}

function metaOf(x) {
  if (x.st === 'running') return fmt(x.secs) + ' · running';
  if (x.st === 'done') return fmt(x.secs) + ' · done';
  return 'idle';
}
function fmt(s) { return s >= 60 ? `${Math.floor(s/60)}m${String(s%60).padStart(2,'0')}s` : `${s}s`; }
function esc(t) { return t.replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

/* ================== 交互 ================== */
function switchMod(mod) {
  if (mod === activeMod) return;
  prevLayer = layerOf();
  activeMod = mod;
  state[layerOf()].unseen = 0;
  render();
}
function switchProv(pid) {
  if (activeMod === 'code' && activeProv === pid) return;
  prevLayer = layerOf();
  activeMod = 'code';
  activeProv = pid;
  state[pid].unseen = 0;
  render();
}

function sendChat(id) {
  const $input = document.getElementById('input-' + id);
  const text = $input.value.trim();
  if (!text) return;
  $input.value = '';
  const s = state[id];
  let t = s.items.find(x => x.id === s.selected);
  if (!t) { t = mkItem(text.slice(0, 16), 'idle'); s.items.unshift(t); s.selected = t.id; }
  if (t.name === '新会话') t.name = text.slice(0, 16);
  t.msgs.push({ who: 'user', text });
  const pending = { who: 'ai', text: '…', pending: true };
  t.msgs.push(pending);
  render(true);
  document.getElementById('input-' + id)?.focus();
  setTimeout(() => {
    pending.text = FAKE_REPLIES[Math.floor(t.msgs.length / 2) % FAKE_REPLIES.length];
    pending.pending = false;
    if (layerOf() !== id) state[id].unseen++;
    render();
  }, 6000);
}

function sendCli(id) {
  const $input = document.getElementById('input-' + id);
  const text = $input.value.trim() || '示例任务：清理死 CSS 并跑一遍构建';
  $input.value = '';
  const s = state[id];
  let t = s.items.find(x => x.id === s.selected && x.st === 'idle' && x.open);
  if (t) {
    t.name = text.slice(0, 24); t.prompt = text;
    t.st = 'running'; t.secs = 0; t.step = 0;
  } else {
    t = mkItem(text.slice(0, 24), 'running', { prompt: text });
    s.items.unshift(t);
  }
  s.selected = t.id;
  scheduleFinish(id, t, 10000);
  render(true);
  document.getElementById('input-' + id)?.focus();
}

function scheduleFinish(id, t, totalMs) {
  const stepIv = setInterval(() => {
    if (t.st !== 'running') { clearInterval(stepIv); return; }
    if (t.step < FAKE_STEPS.length - 1) { t.step++; render(); }
  }, Math.max(1800, totalMs / (FAKE_STEPS.length + 1)));

  t.timer = setTimeout(() => {
    clearInterval(stepIv);
    if (t.st !== 'running') return;
    t.st = 'done';
    t.step = FAKE_STEPS.length;
    if (layerOf() !== id) {
      state[id].unseen++;
      const pv = document.getElementById('pv-' + id);
      pv.classList.remove('just-done');
      void pv.offsetWidth;
      pv.classList.add('just-done');
    }
    render();
  }, totalMs);
}

setInterval(() => {
  let dirty = false;
  LAYERS.forEach(id => state[id].items.forEach(t => {
    if (t.st === 'running') { t.secs++; dirty = true; }
  }));
  if (dirty) render();
}, 1000);

render();
</script>
</body>
