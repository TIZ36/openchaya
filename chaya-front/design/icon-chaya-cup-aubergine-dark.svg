<?xml version="1.0" encoding="UTF-8"?>
<!-- Chaya 茶 — dark equivalent of the aubergine mark, per brief "deep aubergine
     paper, cream ink". Deep plum tile, cream ink cup, warm-ochre steam. Emboss
     via dark offset under the cream mark, no glow, no gold. -->
<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" width="64" height="64">
  <defs>
    <linearGradient id="plum" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#241a29"/><stop offset="1" stop-color="#190f1d"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#plum)"/>
  <rect x="2.5" y="2.5" width="59" height="59" rx="11.5" fill="none" stroke="#e7d4ec" stroke-opacity="0.08" stroke-width="1"/>
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- emboss: dark copy offset down -->
    <g stroke="#0e0812" stroke-opacity="0.6" transform="translate(0 0.8)">
      <path d="M20.5 31 L43.5 31" stroke-width="3"/>
      <path d="M21 31 C21 41 25.5 45.5 32 45.5 C38.5 45.5 43 41 43 31" stroke-width="3"/>
      <path d="M43 33 C49.5 32 49.5 40 43 39" stroke-width="3"/>
    </g>
    <!-- cream ink mark -->
    <g stroke="#efe6d8">
      <path d="M20.5 31 L43.5 31" stroke-width="3"/>
      <path d="M21 31 C21 41 25.5 45.5 32 45.5 C38.5 45.5 43 41 43 31" stroke-width="3"/>
      <path d="M43 33 C49.5 32 49.5 40 43 39" stroke-width="3"/>
    </g>
    <!-- warm ochre steam -->
    <g stroke="#d8a85a">
      <path d="M28 25.5 C24.5 21.5 31 19.5 27.8 15" stroke-width="2.4"/>
      <path d="M36 25.5 C32.5 21.5 39 19.5 35.8 15" stroke-width="2.4"/>
    </g>
  </g>
</svg>
