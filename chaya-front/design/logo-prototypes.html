<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Logo Prototypes — 全新方向</title>
<style>
  :root{
    --bg:#0c0d10; --panel:#16181d; --line:#23262e; --ink:#e9ecf1; --mut:#8b93a1;
    --accent:#5b8cff;
  }
  *{box-sizing:border-box}
  body{
    margin:0; background:
      radial-gradient(900px 500px at 80% -10%, #1b2230 0%, transparent 60%),
      radial-gradient(700px 500px at -10% 110%, #18221c 0%, transparent 55%),
      var(--bg);
    color:var(--ink);
    font:15px/1.6 -apple-system,"SF Pro Text","Helvetica Neue",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased; padding:56px 40px 120px;
  }
  header{max-width:1180px;margin:0 auto 40px}
  h1{font-size:30px;letter-spacing:-.02em;margin:0 0 8px;font-weight:680}
  .lede{color:var(--mut);max-width:760px;margin:0}
  .controls{display:flex;gap:10px;align-items:center;margin-top:22px;flex-wrap:wrap}
  .controls label{color:var(--mut);font-size:13px;margin-right:4px}
  .sw{width:26px;height:26px;border-radius:50%;border:2px solid transparent;cursor:pointer;outline:none;transition:.15s}
  .sw[aria-pressed="true"]{border-color:#fff;transform:scale(1.08)}
  .grid{max-width:1180px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:22px}
  .card{
    background:linear-gradient(180deg,#17191f,#121317);
    border:1px solid var(--line);border-radius:18px;padding:22px;
    display:flex;flex-direction:column;gap:16px;
  }
  .row{display:flex;gap:18px;align-items:center}
  .tile{
    width:108px;height:108px;border-radius:26px;flex:0 0 auto;
    background:radial-gradient(120% 120% at 30% 18%,#26282f 0%,#0a0a0c 78%);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.06),0 10px 26px rgba(0,0,0,.5);
    display:grid;place-items:center;
  }
  .minis{display:flex;flex-direction:column;gap:12px}
  .mini{display:flex;gap:12px;align-items:center}
  .chip{width:44px;height:44px;border-radius:12px;display:grid;place-items:center}
  .chip.dark{background:#0a0a0c}
  .chip.light{background:#f4f1ea;box-shadow:inset 0 0 0 1px #e3ddd0}
  .wordmark{display:flex;align-items:center;gap:10px;color:var(--ink)}
  .wordmark .wm-name{font-size:22px;font-weight:640;letter-spacing:-.01em}
  .meta{border-top:1px solid var(--line);padding-top:14px}
  .meta .code{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);font-weight:700}
  .meta .nm{font-size:18px;font-weight:640;margin:2px 0 4px}
  .meta .desc{color:var(--mut);font-size:13.5px;margin:0}
  .tag{display:inline-block;font-size:11px;color:var(--mut);border:1px solid var(--line);border-radius:999px;padding:2px 9px;margin-top:10px}
  svg{display:block}
  .note{max-width:1180px;margin:42px auto 0;color:var(--mut);font-size:13px;border-top:1px solid var(--line);padding-top:18px}
</style>
</head>
<body>
<header>
  <h1>Logo Prototypes — 八个全新方向</h1>
  <p class="lede">不沿用旧的 Möbius ∞ 与「茶」字面，从产品本质出发：一个把多个本地 AI agent 并行编排、汇成一答的桌面工具。每个方向给了 App 图标（深色瓷砖）、深/浅单色版、以及配字锁版。点上面的色板可换 accent 看效果。</p>
  <div class="controls">
    <label>Accent</label>
    <button class="sw" data-c="#5b8cff" style="background:#5b8cff" aria-pressed="true" title="蓝"></button>
    <button class="sw" data-c="#d97757" style="background:#d97757" title="赭橙(Anthropic 系)"></button>
    <button class="sw" data-c="#4fb286" style="background:#4fb286" title="松绿"></button>
    <button class="sw" data-c="#c7a14a" style="background:#c7a14a" title="金"></button>
    <button class="sw" data-c="#b06cf0" style="background:#b06cf0" title="紫"></button>
    <button class="sw" data-c="#e9ecf1" style="background:#e9ecf1" title="纯白(无彩)"></button>
  </div>
</header>

<main class="grid" id="grid"></main>

<p class="note">用法：开 <code>chaya-front/design/logo-prototypes.html</code>。挑中后告诉我编号/代号（如「3 Prism，金色」），我把它做成 favicon.svg + build/icon-source.svg 全套（含 .icns 生成）。也可以让我把某两个杂交。</p>

<script>
/* ── 每个 logo 都是一个返回 <svg> 字符串的函数：参数 (s 尺寸, a accent, mono 单色色值或null, paper 是否浅底)
   设计为纯描边/几何，确保在 16px favicon 到 512px icon 全程清晰。 ── */
const F = {
  // 1) Confluence 汇流：四股细流自边缘汇入中央亮核 —— 多 agent → 一答
  confluence(s,a,mono){const c=mono||a, ink=mono||'#e9ecf1';const g='cf'+Math.random().toString(36).slice(2,7);
    return `<svg width="${s}" height="${s}" viewBox="0 0 64 64" fill="none">
      <defs><radialGradient id="${g}" cx=".5" cy=".5" r=".5"><stop offset="0" stop-color="${c}"/><stop offset="1" stop-color="${c}" stop-opacity="0"/></radialGradient></defs>
      ${[[10,12],[54,12],[10,52],[54,52]].map(([x,y])=>`<path d="M${x} ${y} Q32 32 32 32" stroke="${ink}" stroke-width="2.4" stroke-linecap="round" opacity=".55"/>`).join('')}
      <circle cx="32" cy="32" r="13" fill="url(#${g})" opacity=".5"/>
      <circle cx="32" cy="32" r="5.4" fill="${c}"/>
      <circle cx="32" cy="32" r="9" stroke="${c}" stroke-width="2" opacity=".9"/>
    </svg>`;},

  // 2) Aperture 光圈：六片叶轮交错成中心多边孔 —— 编排 / 对焦
  aperture(s,a,mono){const c=mono||a, ink=mono||'#e9ecf1';
    const blades=[];for(let i=0;i<6;i++){const ang=i*60*Math.PI/180;const r=22;const x1=32+Math.cos(ang)*r,y1=32+Math.sin(ang)*r;const x2=32+Math.cos(ang+1.05)*9,y2=32+Math.sin(ang+1.05)*9;blades.push(`<path d="M${x1.toFixed(1)} ${y1.toFixed(1)} L${x2.toFixed(1)} ${y2.toFixed(1)}" stroke="${ink}" stroke-width="2.4" stroke-linecap="round" opacity="${i%2?.5:.85}"/>`);}
    return `<svg width="${s}" height="${s}" viewBox="0 0 64 64" fill="none">
      <circle cx="32" cy="32" r="23" stroke="${ink}" stroke-width="2.2" opacity=".35"/>
      ${blades.join('')}
      <circle cx="32" cy="32" r="6.5" stroke="${c}" stroke-width="2.6"/>
    </svg>`;},

  // 3) Prism 棱镜：一束入射，过三角棱镜分出光谱 —— 一个 prompt 扇向多 provider
  prism(s,a,mono){const c=mono||a, ink=mono||'#e9ecf1';
    const fan=[['#ff6b6b',-9],[a,-3],['#4fb286',3],['#c7a14a',9]];
    const beams=mono?[[mono,-9],[mono,-3],[mono,3],[mono,9]]:fan;
    return `<svg width="${s}" height="${s}" viewBox="0 0 64 64" fill="none">
      <path d="M14 30 L30 30" stroke="${ink}" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M32 14 L46 38 L18 38 Z" stroke="${ink}" stroke-width="2.4" stroke-linejoin="round" fill="none" opacity=".9"/>
      ${beams.map(([col,dy])=>`<path d="M40 31 L56 ${31+dy}" stroke="${col}" stroke-width="2.2" stroke-linecap="round"/>`).join('')}
    </svg>`;},

  // 4) Lens 透镜：液态玻璃水滴 + 折射高光 —— 呼应三层玻璃材质
  lens(s,a,mono){const c=mono||a, ink=mono||'#e9ecf1';const g='ln'+Math.random().toString(36).slice(2,7);
    return `<svg width="${s}" height="${s}" viewBox="0 0 64 64" fill="none">
      <defs><linearGradient id="${g}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${c}" stop-opacity=".85"/><stop offset="1" stop-color="${c}" stop-opacity=".15"/></linearGradient></defs>
      <path d="M32 10 C20 26 16 34 16 41 a16 16 0 0 0 32 0 C48 34 44 26 32 10 Z" fill="url(#${g})" stroke="${ink}" stroke-width="2" opacity=".95"/>
      <path d="M25 38 a7 9 0 0 1 7 -8" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity=".8"/>
    </svg>`;},

  // 5) Braid 编织：三股缆绳交辫成一束 —— 并行会话拧成一股
  braid(s,a,mono){const c=mono||a, ink=mono||'#e9ecf1';
    const strand=(off,col,op)=>{let d=`M${16+off} 12`;for(let y=12;y<=52;y+=8){const x=32+Math.sin((y/8)*Math.PI)* (off-16<0?-8:8)*0.6 +off-16;d+=` Q${32} ${y+4} ${(off)+ (((y/8)|0)%2? -6:6)} ${y+8}`;}return `<path d="M${16+off} 12 C${28+off} 24 ${36-off} 26 32 32 C${36-off} 38 ${28+off} 40 ${16+off} 52" stroke="${col}" stroke-width="2.6" stroke-linecap="round" fill="none" opacity="${op}"/>`;};
    return `<svg width="${s}" height="${s}" viewBox="0 0 64 64" fill="none">
      ${strand(8,ink,.55)}
      ${strand(16,c,.95)}
      ${strand(24,ink,.55)}
    </svg>`;},

  // 6) Steep 沏：叶片螺旋舒展出一条信号尾 —— 名字的隐性致敬，不写实
  steep(s,a,mono){const c=mono||a, ink=mono||'#e9ecf1';
    return `<svg width="${s}" height="${s}" viewBox="0 0 64 64" fill="none">
      <path d="M40 16 C24 18 16 30 18 42 C30 44 44 36 44 22 C44 22 30 28 28 40" stroke="${ink}" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <path d="M44 22 C50 28 52 38 48 48" stroke="${c}" stroke-width="2.4" stroke-linecap="round" stroke-dasharray="1 6"/>
      <circle cx="48" cy="48" r="2.6" fill="${c}"/>
    </svg>`;},

  // 7) Mobius+ 进化：把无限符号几何化 —— 给「想保留 DNA」的延续选项
  mobiusx(s,a,mono){const c=mono||a, ink=mono||'#e9ecf1';
    return `<svg width="${s}" height="${s}" viewBox="0 0 64 64" fill="none">
      <path d="M22 22 L42 42 M42 22 L22 42" stroke="${ink}" stroke-width="0" />
      <path d="M16 32 C16 22 24 22 32 32 C40 42 48 42 48 32 C48 22 40 22 32 32 C24 42 16 42 16 32 Z" stroke="${ink}" stroke-width="2.6" stroke-linejoin="round" fill="none"/>
      <circle cx="32" cy="32" r="3.2" fill="${c}"/>
    </svg>`;},

  // 8) Node 枢纽：中央核 + 三颗卫星节点 —— hub 拓扑 / 主 agent 调度子 actor
  node(s,a,mono){const c=mono||a, ink=mono||'#e9ecf1';
    const sat=[[32,12],[14,44],[50,44]];
    return `<svg width="${s}" height="${s}" viewBox="0 0 64 64" fill="none">
      ${sat.map(([x,y])=>`<line x1="32" y1="32" x2="${x}" y2="${y}" stroke="${ink}" stroke-width="2" opacity=".4"/>`).join('')}
      ${sat.map(([x,y])=>`<circle cx="${x}" cy="${y}" r="4.4" stroke="${ink}" stroke-width="2.2" fill="none"/>`).join('')}
      <circle cx="32" cy="32" r="8" fill="${c}"/>
      <circle cx="32" cy="32" r="8" stroke="${c}" stroke-width="6" opacity=".22"/>
    </svg>`;},
};

const CARDS=[
  ['confluence','Confluence','汇流','四股细流自四角汇入一颗亮核——多个 agent 的输出收束成一个答案。最贴产品本质，极简、可缩到 16px。'],
  ['aperture','Aperture','光圈','六片叶轮交错成中央多边孔——编排与对焦的双关，机械感、专业、有记忆点。'],
  ['prism','Prism','棱镜','一束光经棱镜分成光谱——一个 prompt 扇向多 provider。彩色版自带品牌色彩条，单色也成立。'],
  ['lens','Lens','透镜','液态玻璃水滴 + 折射高光——直接呼应三层玻璃材质，最「软」最有质感的一支。'],
  ['braid','Braid','缆辫','三股缆绳拧成一束——并行会话编织。线条优雅，适合做加载动画拆解。'],
  ['steep','Steep','沏','叶片螺旋舒展出虚线信号尾——对「茶」的抽象致敬，但落点是「萃取/生成」而非写实茶叶。'],
  ['mobiusx','Möbius+','无限·进化','把现有 ∞ 几何化、加调度核——给想延续旧 DNA 的稳妥过渡选项。'],
  ['node','Node','枢纽','中央核带三颗卫星节点——主 agent 调度子 actor 的拓扑直给，技术气质最强。'],
];

let accent='#5b8cff';
function render(){
  const grid=document.getElementById('grid');
  grid.innerHTML=CARDS.map(([k,en,zh,desc],i)=>`
    <div class="card">
      <div class="row">
        <div class="tile">${F[k](64,accent,null)}</div>
        <div class="minis">
          <div class="mini"><div class="chip dark">${F[k](30,accent,null)}</div><div class="chip light">${F[k](30,accent,'#111')}</div></div>
          <div class="wordmark">${F[k](28,accent,null)}<span class="wm-name">${en}</span></div>
        </div>
      </div>
      <div class="meta">
        <div class="code">${String(i+1).padStart(2,'0')} · ${en}</div>
        <div class="nm">${zh}</div>
        <p class="desc">${desc}</p>
      </div>
    </div>`).join('');
}
document.querySelectorAll('.sw').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.sw').forEach(x=>x.setAttribute('aria-pressed','false'));
  b.setAttribute('aria-pressed','true'); accent=b.dataset.c; render();
}));
render();
</script>
</body>
</html>
