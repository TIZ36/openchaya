<?xml version="1.0" encoding="UTF-8"?>
<!-- Chaya 茶 — cup + steam, aubergine letterpress mark.
     Auto-switches with the OS theme via prefers-color-scheme:
       light → cream paper, plum ink, ochre steam
       dark  → deep aubergine, cream ink, ochre steam
     Light colors are literal presentation attributes (so non-CSS renderers still
     get a correct light icon); the @media block only overrides for dark.
     No glow, no gold. Used as the in-app / browser-tab brand mark. -->
<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" width="64" height="64">
  <style>
    @media (prefers-color-scheme: dark) {
      .ts0 { stop-color:#241a29; }
      .ts1 { stop-color:#190f1d; }
      .rule { stroke:#e7d4ec; stroke-opacity:0.08; }
      .deboss { stroke:#0e0812; stroke-opacity:0.6; }
      .ink { stroke:#efe6d8; }
      .steam { stroke:#d8a85a; }
    }
  </style>
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop class="ts0" offset="0" stop-color="#f7f2ea"/>
      <stop class="ts1" offset="1" stop-color="#efe6d8"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#tile)"/>
  <rect class="rule" x="2.5" y="2.5" width="59" height="59" rx="11.5" fill="none"
        stroke="#5a3b62" stroke-opacity="0.10" stroke-width="1"/>
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- letterpress deboss/emboss: offset copy of the cup -->
    <g class="deboss" stroke="#ffffff" stroke-opacity="0.65" transform="translate(0 0.8)">
      <path d="M20.5 31 L43.5 31" stroke-width="3"/>
      <path d="M21 31 C21 41 25.5 45.5 32 45.5 C38.5 45.5 43 41 43 31" stroke-width="3"/>
      <path d="M43 33 C49.5 32 49.5 40 43 39" stroke-width="3"/>
    </g>
    <!-- cup mark -->
    <g class="ink" stroke="#54375d">
      <path d="M20.5 31 L43.5 31" stroke-width="3"/>
      <path d="M21 31 C21 41 25.5 45.5 32 45.5 C38.5 45.5 43 41 43 31" stroke-width="3"/>
      <path d="M43 33 C49.5 32 49.5 40 43 39" stroke-width="3"/>
    </g>
    <!-- steam -->
    <g class="steam" stroke="#b8893a">
      <path d="M28 25.5 C24.5 21.5 31 19.5 27.8 15" stroke-width="2.4"/>
      <path d="M36 25.5 C32.5 21.5 39 19.5 35.8 15" stroke-width="2.4"/>
    </g>
  </g>
</svg>
