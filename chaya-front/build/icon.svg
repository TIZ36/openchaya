<?xml version="1.0" encoding="UTF-8"?>
<!-- Chaya 茶 — cup + steam, aubergine letterpress mark (LIGHT dock icon).
     • macOS safe area: rounded body ~80.5% of canvas, transparent padding
       (translate(6.25) scale(0.80453)), so it matches VS Code's footprint.
     • Cup enlarged (scale 1.35 about its centre) so the mark reads clearly.
     The dev dock icon swaps to icon-dark.png in macOS dark mode (see main.cjs).
     Render: build/gen-icon.sh -->
<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" width="64" height="64">
  <defs>
    <linearGradient id="cream" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7f2ea"/><stop offset="1" stop-color="#efe6d8"/>
    </linearGradient>
  </defs>
  <g transform="translate(6.25 6.25) scale(0.80453)">
    <rect width="64" height="64" rx="14.32" fill="url(#cream)"/>
    <rect x="2.5" y="2.5" width="59" height="59" rx="11.9" fill="none" stroke="#5a3b62" stroke-opacity="0.10" stroke-width="1"/>
    <g transform="translate(32 30.5) scale(1.35) translate(-32 -30.5)" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <g stroke="#ffffff" stroke-opacity="0.65" transform="translate(0 0.7)">
        <path d="M20.5 31 L43.5 31" stroke-width="3"/>
        <path d="M21 31 C21 41 25.5 45.5 32 45.5 C38.5 45.5 43 41 43 31" stroke-width="3"/>
        <path d="M43 33 C49.5 32 49.5 40 43 39" stroke-width="3"/>
      </g>
      <g stroke="#54375d">
        <path d="M20.5 31 L43.5 31" stroke-width="3"/>
        <path d="M21 31 C21 41 25.5 45.5 32 45.5 C38.5 45.5 43 41 43 31" stroke-width="3"/>
        <path d="M43 33 C49.5 32 49.5 40 43 39" stroke-width="3"/>
      </g>
      <g stroke="#b8893a" stroke-opacity="0.9">
        <path d="M28 25.5 C24.5 21.5 31 19.5 27.8 15" stroke-width="2.4"/>
        <path d="M36 25.5 C32.5 21.5 39 19.5 35.8 15" stroke-width="2.4"/>
      </g>
    </g>
  </g>
</svg>
