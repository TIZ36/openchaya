server:
  host: 0.0.0.0
  port: 3002
  public_url: "http://localhost:3002"

postgres:
  host: localhost
  port: 5432
  user: postgres
  password: postgres
  database: chaya
  sslmode: disable

redis:
  addr: localhost:6379
  password: "123456"
  db: 1

auth:
  jwt_secret: "chaya-dev-secret-change-in-production"
  token_ttl: 24h

# RAG / 知识库向量：sidecar 使用 chaya-ml（sentence-transformers，384 维）；api 使用 OpenAI 兼容 /embeddings
embedding:
  mode: sidecar
  sidecar_url: "http://localhost:8100"

