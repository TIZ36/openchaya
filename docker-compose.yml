services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: chaya-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chaya
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  # docker compose --profile ml up -d
  chaya-ml:
    profiles:
      - ml
    build:
      context: ./chaya-ml
      dockerfile: Dockerfile
    container_name: chaya-ml
    ports:
      - "8100:8100"
    environment:
      CHAYA_ML_HOST: "0.0.0.0"
      CHAYA_ML_PORT: "8100"

volumes:
  pgdata:
