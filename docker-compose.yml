# PostgreSQL / Redis / MySQL 已迁到「本地共享基础设施」(~/docker-shared, name: shared-infra)。
# 本项目不再自带 pg/redis —— 它们与共享实例端口/账号一致，直接连 localhost 即可：
#   PG    shared-postgres  localhost:5432  postgres/postgres  db=chaya
#   Redis shared-redis     localhost:6379  password=123456    db=1
# 启动共享实例：  cd ~/docker-shared && docker compose up -d
# 详见 ~/docker-shared/README.md。本文件只保留项目专属的 ML sidecar。
services:
  # 项目专属 RAG 向量服务（sentence-transformers，384 维）：docker compose --profile ml up -d
  chaya-ml:
    profiles:
      - ml
    build:
      context: ./chaya-ml
      dockerfile: Dockerfile
    container_name: chaya-ml
    ports:
      - "8100:8100"
    environment:
      CHAYA_ML_HOST: "0.0.0.0"
      CHAYA_ML_PORT: "8100"
